# ===================================
# GitHub Actions - 自动部署 Web 应用
# ===================================
# 触发方式：
#   1. push 到 main 分支时自动构建 Docker 镜像并推送到 GHCR
#   2. 手动触发（workflow_dispatch）
# 部署方式：
#   - 构建 Docker 镜像 → 推送到 GitHub Container Registry (GHCR)
#   - 用户通过 docker pull 运行，或使用 GitHub Codespaces

name: 🚀 Deploy Web App

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker 镜像标签 (如 v1.0.0, latest)'
        required: false
        default: 'latest'

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: 🔨 构建并推送 Docker 镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 📥 Checkout 代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 🏷️ 设置镜像标签
        id: meta
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            TAG="latest"
            SHORT_SHA=$(git rev-parse --short HEAD)
            DATE=$(date +%Y%m%d)
            TAG="${TAG},${DATE}-${SHORT_SHA}"
          fi
          echo "tags=${TAG}" >> $GITHUB_OUTPUT
          echo "📦 镜像标签: ${TAG}"

      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 登录到 GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏗️ 构建并推送镜像
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.head_commit.timestamp }}
            org.opencontainers.image.description="A股自选股智能分析系统"
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      - name: 📋 输出部署信息
        run: |
          echo "### ✅ 部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📦 Docker 镜像" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# 拉取镜像" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 启动容器（WebUI 模式）" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d \\" >> $GITHUB_STEP_SUMMARY
          echo "  --name stock-analysis \\" >> $GITHUB_STEP_SUMMARY
          echo "  --restart unless-stopped \\" >> $GITHUB_STEP_SUMMARY
          echo "  -p 8888:8000 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e WEBUI_HOST=0.0.0.0 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e API_PORT=8000 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e LLM_CHANNELS=custom_nvidia \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e LLM_CUSTOM_NVIDIA_PROTOCOL=openai \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e LLM_CUSTOM_NVIDIA_BASE_URL=https://integrate.api.nvidia.com/v1 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e LLM_CUSTOM_NVIDIA_API_KEY=\${NVIDIA_API_KEY} \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e LLM_CUSTOM_NVIDIA_MODELS=deepseek-ai/deepseek-v3.2 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e LITELLM_MODEL=openai/deepseek-ai/deepseek-v3.2 \\" >> $GITHUB_STEP_SUMMARY
          echo "  -v stock-data:/app/data \\" >> $GITHUB_STEP_SUMMARY
          echo "  ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:latest \\" >> $GITHUB_STEP_SUMMARY
          echo "  python main.py --serve-only --host 0.0.0.0 --port 8000" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 🌐 访问地址" >> $GITHUB_STEP_SUMMARY
          echo "启动后访问: **http://localhost:8888**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ **注意**: 首次运行需要在 GitHub 仓库 Settings > Secrets 中配置 \`NVIDIA_API_KEY\`" >> $GITHUB_STEP_SUMMARY
